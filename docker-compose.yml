services:
  mongo:
    image: mongo:7
    container_name: taskflow-mongo
    restart: unless-stopped
    volumes:
      - mongo_data:/data/db
    networks:
      - internal

  backend:
    build: ./backend
    container_name: taskflow-backend
    restart: unless-stopped
    env_file: ./backend/.env
    depends_on:
      - mongo
    networks:
      - internal

  frontend:
    build: ./frontend
    container_name: taskflow-frontend
    restart: unless-stopped
    networks:
      - internal

  nginx:
    image: nginx:alpine
    container_name: taskflow-nginx
    restart: unless-stopped
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - backend
      - frontend
    networks:
      - internal
      - proxy-net

  mongo-express:
    image: mongo-express
    container_name: taskflow-mongoexpress
    restart: unless-stopped
    ports:
      - "8081:8081"
    environment:
      - ME_CONFIG_MONGODB_SERVER=taskflow-mongo
      - ME_CONFIG_BASICAUTH_USERNAME=admin
      - ME_CONFIG_BASICAUTH_PASSWORD=changeme
    depends_on:
      - mongo
    networks:
      - internal

volumes:
  mongo_data:

networks:
  internal:
  proxy-net:
    external: true
