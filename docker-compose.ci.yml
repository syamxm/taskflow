# CI-only override: makes the stack self-contained for ephemeral DAST.
# Drops the external proxy-net (defined as a local bridge here) and exposes
# nginx on localhost:8080 so ZAP can reach it. Secrets come from backend/.env
# written by the CI job (throwaway values).
services:
  nginx:
    ports:
      - "8080:80"

networks:
  proxy-net:
    external: false
