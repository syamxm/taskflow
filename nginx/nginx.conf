events {}

http {
  resolver 127.0.0.11 valid=10s ipv6=off;
  server_tokens off;
  client_max_body_size 1m;

  server {
    listen 80;

    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    # If Cloudflare Web Analytics is used, add to script-src/connect-src:
    #   https://static.cloudflareinsights.com  https://cloudflareinsights.com
    add_header Content-Security-Policy "default-src 'self'; script-src 'self'; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src 'self' https://fonts.gstatic.com; img-src 'self' data: https:; connect-src 'self'; frame-ancestors 'self'; base-uri 'self'; form-action 'self'" always;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;

    location /api/ {
      set $backend taskflow-backend;
      proxy_pass http://$backend:5000$request_uri;
      proxy_http_version 1.1;
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
    }

    location / {
      set $frontend taskflow-frontend;
      proxy_pass http://$frontend:80$request_uri;
      proxy_http_version 1.1;
      proxy_set_header Host $host;
    }
  }
}
