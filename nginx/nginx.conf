events {}

http {
  server {
    listen 80;

    location /api/ {
      proxy_pass http://taskflow-backend:5000/api/;
      proxy_http_version 1.1;
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
    }

    location / {
      proxy_pass http://taskflow-frontend:80/;
      proxy_http_version 1.1;
      proxy_set_header Host $host;
    }
  }
}
