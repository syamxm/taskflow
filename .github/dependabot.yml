version: 2
updates:
  # npm: group only safe minor+patch (auto-merged). Majors arrive as their own
  # PRs so one breaking bump can't block the rest — you review/migrate each.
  - package-ecosystem: npm
    directory: /backend
    schedule:
      interval: monthly
    open-pull-requests-limit: 5
    groups:
      backend-deps:
        patterns: ["*"]
        update-types: ["minor", "patch"]

  - package-ecosystem: npm
    directory: /frontend
    schedule:
      interval: monthly
    open-pull-requests-limit: 5
    groups:
      frontend-deps:
        patterns: ["*"]
        update-types: ["minor", "patch"]

  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: monthly
    groups:
      actions:
        patterns: ["*"]
        update-types: ["minor", "patch"]

  - package-ecosystem: docker
    directory: /backend
    schedule:
      interval: monthly

  - package-ecosystem: docker
    directory: /frontend
    schedule:
      interval: monthly
