name: Deploy TaskFlow

on:
  push:
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  gitleaks:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0
      - name: Scan for secrets
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  semgrep:
    runs-on: ubuntu-latest
    container:
      image: semgrep/semgrep
    steps:
      - uses: actions/checkout@v7
      - name: Static analysis
        run: |
          semgrep scan --error --severity ERROR \
            --config p/default --config p/javascript --config p/nodejs \
            --config p/owasp-top-ten

  trivy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - name: Scan repo for misconfigurations
        uses: aquasecurity/trivy-action@v0.36.0
        with:
          scan-type: fs
          scan-ref: .
          scanners: misconfig,secret
          severity: HIGH,CRITICAL
          exit-code: '1'
          trivyignores: .trivyignore
      - name: Build backend image
        run: docker build -t taskflow-backend:ci backend
      - name: Scan backend image
        uses: aquasecurity/trivy-action@v0.36.0
        with:
          scan-type: image
          image-ref: taskflow-backend:ci
          severity: HIGH,CRITICAL
          ignore-unfixed: true
          exit-code: '1'
          trivyignores: .trivyignore
      - name: Build frontend image
        run: docker build -t taskflow-frontend:ci frontend
      - name: Scan frontend image
        uses: aquasecurity/trivy-action@v0.36.0
        with:
          scan-type: image
          image-ref: taskflow-frontend:ci
          severity: HIGH,CRITICAL
          ignore-unfixed: true
          exit-code: '1'
          trivyignores: .trivyignore

  deploy:
    needs: [gitleaks, semgrep, trivy]
    if: github.event_name != 'pull_request' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    concurrency:
      group: deploy-production
      cancel-in-progress: false
    steps:
      - name: Connect to Tailscale
        uses: tailscale/github-action@v3
        with:
          oauth-client-id: ${{ secrets.TS_OAUTH_CLIENT_ID }}
          oauth-secret: ${{ secrets.TS_OAUTH_SECRET }}
          tags: tag:ci
      - name: Deploy to server
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          username: ${{ secrets.DEPLOY_USER }}
          key: ${{ secrets.DEPLOY_SSH_KEY }}
          port: ${{ secrets.DEPLOY_PORT }}
          script: |
            set -e
            cd ~/taskflow
            git fetch origin main
            git checkout main
            git reset --hard origin/main
            docker compose --env-file backend/.env up -d --build --remove-orphans
            docker image prune -f
            echo "Deploy complete at $(date)"
