name: Deploy TaskFlow

on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: deploy-production
  cancel-in-progress: false

jobs:
  security-gate:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    strategy:
      fail-fast: false
      matrix:
        dir: [backend, frontend]
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Gitleaks
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      - name: Semgrep (errors only)
        run: |
          docker run --rm -v "$PWD:/src" -w /src semgrep/semgrep \
            semgrep scan --error --severity ERROR --quiet \
            --config p/default --config p/javascript --config p/nodejs \
            --config p/owasp-top-ten --config p/secrets
      - name: Trivy filesystem scan (${{ matrix.dir }})
        uses: aquasecurity/trivy-action@v0.36.0
        with:
          scan-type: fs
          scan-ref: ${{ matrix.dir }}
          scanners: vuln
          severity: HIGH,CRITICAL
          ignore-unfixed: true
          trivyignores: .trivyignore
          exit-code: '1'
      - uses: docker/setup-buildx-action@v3
      - name: Build ${{ matrix.dir }} image
        uses: docker/build-push-action@v6
        with:
          context: ./${{ matrix.dir }}
          load: true
          tags: taskflow-${{ matrix.dir }}:gate
          cache-from: type=gha,scope=${{ matrix.dir }}
          cache-to: type=gha,mode=max,scope=${{ matrix.dir }}
      - name: Trivy image scan (${{ matrix.dir }})
        uses: aquasecurity/trivy-action@v0.36.0
        with:
          scan-type: image
          image-ref: taskflow-${{ matrix.dir }}:gate
          severity: HIGH,CRITICAL
          ignore-unfixed: true
          trivyignores: .trivyignore
          exit-code: '1'

  deploy:
    needs: security-gate
    runs-on: ubuntu-latest
    steps:
      - name: Connect to Tailscale
        uses: tailscale/github-action@v3
        with:
          oauth-client-id: ${{ secrets.TS_OAUTH_CLIENT_ID }}
          oauth-secret: ${{ secrets.TS_OAUTH_SECRET }}
          tags: tag:ci

      - name: Deploy to server
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          username: ${{ secrets.DEPLOY_USER }}
          key: ${{ secrets.DEPLOY_SSH_KEY }}
          port: ${{ secrets.DEPLOY_PORT }}
          script: |
            set -e
            cd ~/taskflow
            git fetch origin main
            git reset --hard origin/main
            docker compose up -d --build --remove-orphans
            docker image prune -f
            echo "Deploy complete at $(date)"
