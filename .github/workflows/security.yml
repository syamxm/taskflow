name: Security

on:
  pull_request:
  push:
    branches-ignore: [main]

permissions:
  contents: read
  security-events: write

jobs:
  secret-scan:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Gitleaks
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  sast:
    runs-on: ubuntu-latest
    container:
      image: semgrep/semgrep
    steps:
      - uses: actions/checkout@v4
      - name: Semgrep scan
        run: semgrep ci --sarif --output semgrep.sarif
        env:
          SEMGREP_RULES: >-
            p/default p/javascript p/nodejs p/express p/owasp-top-ten p/secrets
      - name: Upload SARIF
        if: always()
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: semgrep.sarif

  deps:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        dir: [backend, frontend]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - name: npm audit (${{ matrix.dir }})
        working-directory: ${{ matrix.dir }}
        run: npm audit --audit-level=high
      - name: Trivy dependency scan (${{ matrix.dir }})
        uses: aquasecurity/trivy-action@0.35.0
        with:
          scan-type: fs
          scan-ref: ${{ matrix.dir }}
          scanners: vuln
          severity: HIGH,CRITICAL
          exit-code: '1'

  iac-lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Hadolint backend
        uses: hadolint/hadolint-action@v3.1.0
        with:
          dockerfile: backend/Dockerfile
      - name: Hadolint frontend
        uses: hadolint/hadolint-action@v3.1.0
        with:
          dockerfile: frontend/Dockerfile
      - name: Trivy misconfig scan
        uses: aquasecurity/trivy-action@0.35.0
        with:
          scan-type: config
          scan-ref: .
          severity: HIGH,CRITICAL
          exit-code: '1'

  image-scan:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        image: [backend, frontend]
    steps:
      - uses: actions/checkout@v4
      - name: Build ${{ matrix.image }} image
        run: docker build -t taskflow-${{ matrix.image }}:ci ./${{ matrix.image }}
      - name: Trivy image scan
        uses: aquasecurity/trivy-action@0.35.0
        with:
          scan-type: image
          image-ref: taskflow-${{ matrix.image }}:ci
          severity: HIGH,CRITICAL
          exit-code: '1'
          format: sarif
          output: trivy-${{ matrix.image }}.sarif
      - name: Upload SARIF
        if: always()
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: trivy-${{ matrix.image }}.sarif
          category: image-${{ matrix.image }}
      - name: Generate SBOM
        run: |
          docker run --rm -v /var/run/docker.sock:/var/run/docker.sock \
            aquasec/trivy image --format cyclonedx \
            --output /dev/stdout taskflow-${{ matrix.image }}:ci > sbom-${{ matrix.image }}.json || true
      - name: Upload SBOM
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: sbom-${{ matrix.image }}
          path: sbom-${{ matrix.image }}.json

  dast:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4
      - name: Write throwaway env
        run: |
          cat > backend/.env <<EOF
          MONGO_INITDB_ROOT_USERNAME=ci
          MONGO_INITDB_ROOT_PASSWORD=ci_password
          MONGO_URI=mongodb://ci:ci_password@mongo:27017/taskflow?authSource=admin
          JWT_SECRET=$(openssl rand -hex 32)
          ENCRYPTION_KEY=$(openssl rand -hex 32)
          PORT=5000
          NODE_ENV=production
          COOKIE_SECURE=false
          EOF
      - name: Start ephemeral stack
        run: docker compose -f docker-compose.yml -f docker-compose.ci.yml up -d --build
      - name: Wait for app
        run: |
          for i in $(seq 1 30); do
            if curl -fs http://localhost:8080/api/health; then echo ready; exit 0; fi
            sleep 2
          done
          echo "app did not become healthy"; docker compose logs; exit 1
      - name: ZAP baseline scan
        uses: zaproxy/action-baseline@v0.14.0
        with:
          target: http://localhost:8080
          rules_file_name: .zap/rules.tsv
          cmd_options: -I
          fail_action: false
          allow_issue_writing: false
      - name: Tear down
        if: always()
        run: docker compose -f docker-compose.yml -f docker-compose.ci.yml down -v
