name: Security

on:
  pull_request:
  push:
    branches-ignore: [main]

permissions:
  contents: read
  security-events: write

jobs:
  security:
    uses: ./.github/workflows/security-scan.yml
    secrets: inherit

  frontend-build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v6
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - name: Install and build
        working-directory: frontend
        run: |
          npm ci
          npm run build

  backend-smoke:
    runs-on: ubuntu-latest
    services:
      mongo:
        image: mongo:7
        ports:
          - 27017:27017
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v6
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: backend/package-lock.json
      - name: Install
        working-directory: backend
        run: npm ci
      - name: Boot and health check
        working-directory: backend
        run: |
          export MONGO_URI=mongodb://localhost:27017/taskflow
          export JWT_SECRET=$(openssl rand -hex 32)
          export ENCRYPTION_KEY=$(openssl rand -hex 32)
          export PORT=5000
          export NODE_ENV=production
          export COOKIE_SECURE=false
          node src/index.js &
          for i in $(seq 1 30); do
            if curl -fs http://localhost:5000/api/health; then echo "backend healthy"; exit 0; fi
            sleep 2
          done
          echo "backend did not become healthy"; exit 1

  dast:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4
      - name: Write throwaway env
        run: |
          cat > backend/.env <<EOF
          MONGO_INITDB_ROOT_USERNAME=ci
          MONGO_INITDB_ROOT_PASSWORD=ci_password
          MONGO_URI=mongodb://ci:ci_password@mongo:27017/taskflow?authSource=admin
          JWT_SECRET=$(openssl rand -hex 32)
          ENCRYPTION_KEY=$(openssl rand -hex 32)
          PORT=5000
          NODE_ENV=production
          COOKIE_SECURE=false
          EOF
      - name: Start ephemeral stack
        run: docker compose -f docker-compose.yml -f docker-compose.ci.yml up -d --build
      - name: Wait for app
        run: |
          for i in $(seq 1 30); do
            if curl -fs http://localhost:8080/api/health; then echo ready; exit 0; fi
            sleep 2
          done
          echo "app did not become healthy"; docker compose logs; exit 1
      - name: ZAP baseline scan
        uses: zaproxy/action-baseline@v0.15.0
        with:
          target: http://localhost:8080
          rules_file_name: .zap/rules.tsv
          cmd_options: -I
          fail_action: false
          allow_issue_writing: false
      - name: Tear down
        if: always()
        run: docker compose -f docker-compose.yml -f docker-compose.ci.yml down -v
