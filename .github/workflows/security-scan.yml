name: security-scan

on:
  workflow_call:
    inputs:
      severity:
        type: string
        default: HIGH,CRITICAL

permissions:
  contents: read
  security-events: write

jobs:
  secret-scan:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Gitleaks
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  sast:
    runs-on: ubuntu-latest
    container:
      image: semgrep/semgrep
    steps:
      - uses: actions/checkout@v4
      - name: Semgrep scan
        run: |
          semgrep scan --error --severity ERROR --sarif --output semgrep.sarif \
            --config p/default --config p/javascript --config p/nodejs \
            --config p/owasp-top-ten
      - name: Upload SARIF
        if: always()
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: semgrep.sarif

  deps:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        dir: [backend, frontend]
    steps:
      - uses: actions/checkout@v4
      - name: Trivy dependency scan (${{ matrix.dir }})
        uses: aquasecurity/trivy-action@v0.36.0
        with:
          scan-type: fs
          scan-ref: ${{ matrix.dir }}
          scanners: vuln
          severity: ${{ inputs.severity }}
          ignore-unfixed: true
          trivyignores: .trivyignore
          exit-code: '1'

  iac-lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Hadolint backend
        uses: hadolint/hadolint-action@v3.3.0
        with:
          dockerfile: backend/Dockerfile
      - name: Hadolint frontend
        uses: hadolint/hadolint-action@v3.3.0
        with:
          dockerfile: frontend/Dockerfile
      - name: Trivy misconfig scan
        uses: aquasecurity/trivy-action@v0.36.0
        with:
          scan-type: config
          scan-ref: .
          severity: ${{ inputs.severity }}
          exit-code: '1'

  image-scan:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        image: [backend, frontend]
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - name: Build ${{ matrix.image }} image
        uses: docker/build-push-action@v6
        with:
          context: ./${{ matrix.image }}
          load: true
          tags: taskflow-${{ matrix.image }}:ci
          cache-from: type=gha,scope=${{ matrix.image }}
          cache-to: type=gha,mode=max,scope=${{ matrix.image }}
      - name: Trivy image scan
        uses: aquasecurity/trivy-action@v0.36.0
        with:
          scan-type: image
          image-ref: taskflow-${{ matrix.image }}:ci
          severity: ${{ inputs.severity }}
          ignore-unfixed: true
          trivyignores: .trivyignore
          exit-code: '1'
          format: sarif
          output: trivy-${{ matrix.image }}.sarif
      - name: Upload SARIF
        if: always()
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: trivy-${{ matrix.image }}.sarif
          category: image-${{ matrix.image }}
